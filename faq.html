<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>farrhan.</title>

  <!-- 
    FONTS USED:
    - Playfair Display = elegant serif for the big title
    - Space Mono = brutalist monospace for everything else
    Change these at fonts.google.com if you want different ones
  -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">

  <style>
    
    /* === CHANGE COLORS HERE === */
    :root {
      --bg-page: #0B1215;
      --bg-card: #ffffff;
      --text:    #000000;
      --border:  #0B1215;
    }

    /* === PAGE === */
    body {
      background-color: var(--bg-page);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* =============================================
       VIDEO BACKGROUND
       Put your .mp4 file in the same folder as
       index.html and change "botanical.mp4" below
       to match your filename
    ============================================= */
    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      overflow: hidden;
    }

    .video-bg video {
      width: 100%;
      height: 100%;
      object-fit: cover;        /* fills the screen without stretching */
      filter: blur(3px)         /* CHANGE blur amount here — try 2px to 8px */
              brightness(0.4);  /* CHANGE darkness here — lower = darker */
    }

    /* === GRAIN OVERLAY === */
    .video-bg::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.12;           /* CHANGE grain strength here */
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px 128px;
      animation: grain 0.5s steps(1) infinite;
    }

    @keyframes grain {
      0%   { background-position: 0% 0%; }
      10%  { background-position: -5% -10%; }
      20%  { background-position: -15% 5%; }
      30%  { background-position: 7% -25%; }
      40%  { background-position: -5% 25%; }
      50%  { background-position: -15% 10%; }
      60%  { background-position: 15% 0%; }
      70%  { background-position: 0% 15%; }
      80%  { background-position: 3% 35%; }
      90%  { background-position: -10% 10%; }
      100% { background-position: 0% 0%; }
    }

    /* === CARD === */
    .card {
      position: relative;
      z-index: 1;              /* sits above the video */
      width: 100%;
      max-width: 800px;
      background-color: var(--bg-card);
      border: 3px solid var(--border);
    }

    /* === HEADER === */
    header {
      padding: 2rem;
      border-bottom: 3px solid var(--border);
      text-align: center;
    }

    .name {
      font-family: 'Playfair Display', serif; /* CHANGE TITLE FONT HERE */
      font-size: 4rem;                      /* CHANGE TITLE SIZE HERE */
      font-weight: 100;
      line-height: 1;
      margin-bottom: 1rem;
    }

    .tagline {
      font-size: 1rem;
    }

    /* === SECTIONS === */
    .section {
      padding: 1rem 1rem;
      border-bottom: 6px solid var(--border);
    }

    /* === SECTION LABELS === */
    .label {
      font-size: 1rem;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }

    /* === BIO === */
    .bio {
      font-size: 1rem;
      border-left: 3px solid var(--border);
      padding-left: 1rem;
    }


/* === ABOUT BUTTONS === */
.about-buttons {
  display: flex;
  gap: 0.5rem;
  margin-top: 1.25rem;
}

.about-btn {
  padding: .8rem 1rem;
  border: 3px solid var(--border);
  text-decoration: none;
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 0.8rem;
  transition: background-color 0.15s, color 0.15s;
}

.about-btn:hover {
  background-color: var(--border);
  color: var(--bg-card);
}

    /* === LINK ROWS === */
    .link-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .8rem 1rem;
      border: 3px solid var(--border);
      text-decoration: none;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 0.8rem;
      margin-bottom: 0.4rem;
      transition: background-color 0.15s, color 0.15s;
    }

    .link-row:last-child { margin-bottom: 0; }

    /* hover inverts the row — white text on dark bg */
    .link-row:hover {
      background-color: var(--border);
      color: var(--bg-card);
    }

    /* === FOOTER === */
    footer {
      padding: .8rem 1rem;
      border-top: 3px solid var(--border);
      text-align: center;
      font-size: 0.8rem;
    }

  </style>
</head>
<body>

  <!-- =============================================
       VIDEO BACKGROUND
       1. Download a botanical .mp4 from pexels.com
       2. Put it in the same folder as index.html
       3. Change "botanical.mp4" below to your filename
  ============================================= -->
  <div class="video-bg">
    <video autoplay muted loop playsinline>
      <source src="botanical.mp4" type="video/mp4">
      <!-- if no video file found, page background stays dark — that is fine -->
    </video>
  </div>

  <!-- CARD -->
  <div class="card">
    <!-- ABOUT -->
    <div class="section">
      <div class="label">Frequently Asked Questions:</div>
      <p class="bio">
How old are you?<br> 24<br><br>
Where are you from?<br>Sarawak, Malaysia<br><br>
How tall are you?<br>171cm (The extra 1cm is important)<br><br>
What is your Major?<br>Art and Design<br><br>
What are you?<br>Half Chinese, Half Melanau.<br><br>
What is your MBTI?<br>INTJ<br><br>
</p>

    <div class="about-buttons">
      <a href="equipment.html" class="about-btn">Equipment</a>
      <a href="faq.html" class="about-btn">FAQ</a>
  </div>

</body>
</html>
