<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>farrhan. - QR</title>

  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">

  <style>

    :root {
      --bg-page: #0B1215;
      --bg-card: #ffffff;
      --text:    #000000;
      --border:  #0B1215;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg-page);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      width: 100%;
      max-width: 400px;
      background-color: var(--bg-card);
      border: 3px solid var(--border);
    }

    header {
      padding: 1.5rem 2rem;
      border-bottom: 3px solid var(--border);
      text-align: center;
    }

    .scan {
      font-family: 'DM Sans', sans-serif;
      font-size: 1.3rem;
      font-weight: 100;
      line-height: 1;
    }

    .qr-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-wrapper img {
      width: 100%;
      height: auto;
      display: block;
    }

  </style>
</head>
<body>

  <div class="card">

    <header>
      <div class="scan">Scan me. (or head to <a href="https://farrhan.com/">farrhan.com</a>)</div>
    </header>

    <div class="qr-wrapper">
      <!-- Replace qr.jpg with your actual filename if different -->
      <img src="assets/qr.jpg" alt="QR code">
    </div>

  </div>

</body>
</html>
